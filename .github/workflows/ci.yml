name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  django-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: django_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: django_app/requirements.txt
      - run: pip install -r requirements.txt
      - run: python manage.py test catalog --verbosity=2

  fastapi-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastapi_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: fastapi_app/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v
